<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}{{ app_name }}{% endblock %}</title>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#e94560">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  :root { --primary: #e94560; }
  body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
  .navbar { background: var(--primary) !important; }
  .navbar-brand { font-weight: 700; font-size: 1.2rem; }
  .btn-primary { background: var(--primary); border-color: var(--primary); }
  .btn-primary:hover { background: #c73651; border-color: #c73651; }
  .card { background: #161b22; border: 1px solid #30363d; }
  .form-control, .form-select { background: #0d1117; border-color: #30363d; color: #e6edf3; }
  .form-control:focus, .form-select:focus { background: #0d1117; border-color: var(--primary); color: #e6edf3; box-shadow: 0 0 0 0.25rem rgba(233,69,96,.25); }
  footer { color: #8b949e; font-size: 0.8rem; }
</style>
{% block head %}{% endblock %}
</head>
<body>
<nav class="navbar navbar-dark mb-4">
  <div class="container">
    <span class="navbar-brand">🏀 {{ app_name }}</span>
  </div>
</nav>

<div class="container pb-5">
{% block content %}{% endblock %}
</div>

<div class="container mb-4">
  <footer class="text-center">
    Footage recorded on your own device is your original content.
    Ensure rights before uploading to public platforms.
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/sw.js').catch(() => {});
}
// PWA install prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  const btn = document.getElementById('installBtn');
  if (btn) { btn.style.display = 'inline-block'; btn.addEventListener('click', () => { deferredPrompt.prompt(); }); }
});
</script>
{% block scripts %}{% endblock %}
</body>
</html>
