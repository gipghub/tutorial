name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --dev --extra dev

      - name: Install system deps for OpenCV
        run: sudo apt-get install -y libgl1-mesa-glx libglib2.0-0 ffmpeg

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        run: uv run pytest tests/integration/ -v --tb=short
        env:
          # No real API key needed — commentary is mocked in integration tests
          ANTHROPIC_API_KEY: ""

      - name: Coverage report
        run: uv run pytest tests/ --cov=basketball_analyzer --cov-report=xml --tb=short
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ""
